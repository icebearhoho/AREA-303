name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  sanity-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Byte-compile all scripts (catches syntax errors)
        run: python -m py_compile *.py

      - name: Check no data files were committed
        run: |
          if git ls-files 'dataset/**/*.csv' 'dataset/**/*.parquet' 'dataset/**/*.xlsx' 'dataset/**/*.zip' | grep -q .; then
            echo "Raw/processed data files must not be committed (see .gitignore)."
            git ls-files 'dataset/**/*.csv' 'dataset/**/*.parquet' 'dataset/**/*.xlsx' 'dataset/**/*.zip'
            exit 1
          fi
